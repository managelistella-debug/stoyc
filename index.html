<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stoyc</title>
  <style>
    @font-face { font-family: 'Stoyc-UI'; font-weight: 400; src: url('assets/fonts/NordRegular.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-UI'; font-weight: 500; src: url('assets/fonts/NordMedium.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-Heading'; font-weight: 900; src: url('assets/fonts/NeueMontrealBold.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-Serif'; font-weight: 400; src: url('assets/fonts/InstrumentSerif-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Stoyc-Condensed'; font-weight: 400; src: url('assets/fonts/F37Stout-BlackCompressed.ttf') format('truetype'); }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body { opacity: 1; transition: opacity 0.45s ease; }
    body.sc-leaving { opacity: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ───── Intro overlay ───── */

    @keyframes introLineIn {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes introLineOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-32px); }
    }
    @keyframes introFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; visibility: hidden; }
    }

    .sc-intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: introFadeOut 0.6s ease 2.5s forwards;
    }

    .sc-intro-lines { text-align: center; }

    .sc-intro-line {
      font-family: 'Stoyc-Condensed', sans-serif;
      font-weight: 400;
      font-size: clamp(2.5rem, 6vw, 6rem);
      line-height: 1.05;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      transform: translateY(32px);
    }

    .sc-intro-line-1 {
      animation: introLineIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.35s forwards,
                 introLineOut 0.5s cubic-bezier(0.55, 0.06, 0.68, 0.19) 2.0s forwards;
    }
    .sc-intro-line-2 {
      animation: introLineIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.55s forwards,
                 introLineOut 0.5s cubic-bezier(0.55, 0.06, 0.68, 0.19) 2.15s forwards;
    }

    .sc-intro-accent {
      font-family: 'Stoyc-Serif', serif;
      font-style: italic;
      text-transform: none;
    }

    /* ───── Header ───── */

    .sc-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 36px;
      pointer-events: none;
      opacity: 0;
    }
    body.sc-intro-done .sc-header {
      animation: fadeUp 0.7s ease-out 0.25s forwards;
    }
    .sc-header > * { pointer-events: auto; }
    .sc-logo img { display: block; }

    .sc-contact {
      font-family: 'Stoyc-UI', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      background: transparent;
      padding: 10px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .sc-contact:hover { background: #fff; color: #000; border-color: #fff; }

    /* ───── Split container ───── */

    .sc-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .sc-panel {
      position: relative;
      flex: 1;
      overflow: hidden;
      display: block;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      background: #000;
      opacity: 0;
    }
    body.sc-intro-done .sc-panel {
      animation: fadeUp 0.9s ease-out forwards;
    }
    body.sc-intro-done #sc-panel-left  { animation-delay: 0.05s; }
    body.sc-intro-done #sc-panel-right { animation-delay: 0.2s; }

    /* ───── Video wrapper (GPU-composited scale for smooth inset) ───── */

    .sc-video-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 0;
      transform: scale(1);
      transform-origin: center;
      will-change: transform, border-radius;
      transition: transform 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  border-radius 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .sc-panel:hover .sc-video-wrap {
      transform: scale(0.92);
      border-radius: 18px;
    }

    .sc-video-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .sc-panel:hover .sc-video-wrap::after { opacity: 0; }

    .sc-panel-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ───── Panel content ───── */

    .sc-content {
      position: absolute;
      bottom: 48px;
      left: 44px;
      right: 44px;
      z-index: 2;
      text-shadow: 0 2px 20px rgba(0,0,0,0.35);
      will-change: transform;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .sc-panel:hover .sc-content { transform: translateY(-20px); }

    .sc-content h2 {
      font-family: 'Stoyc-Condensed', sans-serif;
      font-weight: 400;
      font-size: clamp(3rem, 5.5vw, 5.5rem);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .sc-tagline {
      font-family: 'Stoyc-UI', sans-serif;
      font-size: clamp(12px, 0.95vw, 14px);
      font-weight: 400;
      line-height: 1.6;
      max-width: 320px;
      max-height: 0;
      margin: 0;
      opacity: 0;
      overflow: hidden;
      color: rgba(255,255,255,0.75);
      text-shadow: none;
      transition: max-height 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.05s,
                  opacity 0.4s ease 0.1s,
                  margin 0.4s ease 0.05s;
    }

    .sc-panel:hover .sc-tagline {
      max-height: 80px;
      opacity: 1;
      margin-top: 14px;
    }

    .sc-btn {
      display: inline-block;
      font-family: 'Stoyc-UI', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
      padding: 9px 24px;
      border-radius: 100px;
      margin-top: 20px;
      text-shadow: none;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .sc-panel:hover .sc-btn {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.55);
    }

    /* ───── Mobile ───── */

    @media (max-width: 768px) {
      .sc-container { flex-direction: column; }

      .sc-header { padding: 18px 20px; }
      .sc-logo img { width: 104px; height: auto; }

      .sc-content {
        bottom: 28px; left: 28px; right: 28px;
      }
      .sc-content h2 { font-size: clamp(2.4rem, 10vw, 3.5rem); }

      .sc-tagline {
        max-height: none;
        opacity: 0.7;
        overflow: visible;
        margin-top: 10px;
        max-width: none;
        font-size: 12px;
        transition: none;
      }

      .sc-panel:hover .sc-content { transform: none; }
      .sc-panel:hover .sc-tagline { margin-top: 10px; }

      .sc-panel:active .sc-video-wrap {
        transform: scale(0.94);
        border-radius: 12px;
      }
      .sc-panel:active .sc-video-wrap::after { opacity: 0; }

      .sc-intro-line { font-size: clamp(2rem, 8vw, 3.5rem); }
    }
  </style>
</head>
<body>

  <!-- Intro text animation -->
  <div class="sc-intro" id="sc-intro">
    <div class="sc-intro-lines">
      <div class="sc-intro-line sc-intro-line-1">
        Powering the top <span class="sc-intro-accent">1%</span>
      </div>
      <div class="sc-intro-line sc-intro-line-2">
        of real estate brands
      </div>
    </div>
  </div>

  <header class="sc-header">
    <a href="/" class="sc-logo">
      <img src="assets/stoyc-logo.svg" alt="Stoyc" width="130" height="29">
    </a>
    <a href="contact.html" class="sc-contact">Contact</a>
  </header>

  <main class="sc-container">

    <a href="/marketing" class="sc-panel" id="sc-panel-left">
      <div class="sc-video-wrap">
        <video class="sc-panel-video" autoplay loop muted playsinline preload="auto">
          <source src="assets/split-video-marketing.mp4" type="video/mp4">
        </video>
      </div>
      <div class="sc-content">
        <h2>Marketing<br>&amp; Design</h2>
        <p class="sc-tagline">Websites that stand out immediately and convert consistently. Every detail intentional.</p>
        <span class="sc-btn">Learn More &rarr;</span>
      </div>
    </a>

    <a href="/ai" class="sc-panel" id="sc-panel-right">
      <div class="sc-video-wrap">
        <video class="sc-panel-video" autoplay loop muted playsinline preload="auto">
          <source src="assets/split-video-ai.mp4" type="video/mp4">
        </video>
      </div>
      <div class="sc-content">
        <h2>AI<br>Systems</h2>
        <p class="sc-tagline">Save time. Nurture more leads. Operate smarter. AI built for real estate.</p>
        <span class="sc-btn">Explore AI &rarr;</span>
      </div>
    </a>

  </main>

  <script>
    (function() {
      /* Trigger panel/header entrance after intro finishes */
      setTimeout(function() {
        document.body.classList.add('sc-intro-done');
      }, 2500);

      /* Remove intro overlay from layout after animations complete */
      setTimeout(function() {
        var intro = document.getElementById('sc-intro');
        if (intro) intro.remove();
      }, 3200);

      /* Page-exit fade on panel click */
      document.querySelectorAll('.sc-panel').forEach(function(panel) {
        panel.addEventListener('click', function(e) {
          e.preventDefault();
          var href = this.getAttribute('href');
          document.body.classList.add('sc-leaving');
          setTimeout(function() { window.location.href = href; }, 450);
        });
      });

      /* Guarantee video playback on all devices */
      function ensurePlay() {
        document.querySelectorAll('.sc-panel-video').forEach(function(v) {
          if (v.paused && v.play) {
            v.play().catch(function() {});
          }
        });
      }
      document.addEventListener('touchstart', ensurePlay, { once: true });
      document.addEventListener('click', ensurePlay, { once: true });
    })();
  </script>

</body>
</html>
