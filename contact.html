<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Stoyc</title>
  <meta name="description" content="Get in touch with Stoyc — luxury creative studio for design, marketing, and AI in real estate.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.jpg">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact | Stoyc">
  <meta property="og:description" content="Get in touch with Stoyc — luxury creative studio for design, marketing, and AI in real estate.">
  <meta property="og:image" content="https://stoyc.com/assets/og-image.jpg">
  <meta property="og:url" content="https://stoyc.com/contact">
  <meta property="og:site_name" content="Stoyc">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact | Stoyc">
  <meta name="twitter:description" content="Get in touch with Stoyc — luxury creative studio for design, marketing, and AI in real estate.">
  <meta name="twitter:image" content="https://stoyc.com/assets/og-image.jpg">
  <style>
    @font-face { font-family: 'Stoyc-UI'; font-weight: 400; src: url('assets/fonts/NordRegular.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-UI'; font-weight: 500; src: url('assets/fonts/NordMedium.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-Heading'; font-weight: 900; src: url('assets/fonts/NeueMontrealBold.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-Condensed'; font-weight: 400; src: url('assets/fonts/F37Stout-BlackCompressed.ttf') format('truetype'); }
    @font-face { font-family: 'Stoyc-Serif'; font-weight: 400; src: url('assets/fonts/InstrumentSerif-Regular.ttf') format('truetype'); }
    html, body { margin: 0; padding: 0; background: #000; color: #fff; overflow-x: hidden; }
    body { min-height: 100vh; font-family: 'Stoyc-UI', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { text-decoration: none; color: inherit; }
  </style>
  <style>
    .contact-nav {
      position: fixed; top: 0; left: 0; width: 100%; padding: 30px;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
    }
    .contact-nav a {
      font-size: 14px; text-transform: uppercase; letter-spacing: 0.02em;
      position: relative;
    }
    .contact-nav a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 100%;
      height: 1px; background: #fff; transform: scaleX(0); transform-origin: right;
      transition: transform 0.3s ease;
    }
    .contact-nav a:hover::after { transform: scaleX(1); transform-origin: left; }
    .contact-nav-logo img { width: 100px; height: auto; display: block; }
    .contact-nav-links { display: flex; gap: 30px; }

    .contact-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 120px 30px 60px;
    }
    .contact-container {
      width: 100%; max-width: 700px;
    }
    .contact-heading {
      font-family: 'Stoyc-Condensed', 'Impact', sans-serif; font-weight: 400;
      font-size: clamp(48px, 8vw, 120px); text-transform: uppercase;
      line-height: 0.85; letter-spacing: 0.02em; margin-bottom: 20px;
    }
    .contact-subtitle {
      font-size: clamp(14px, 1.2vw, 18px); line-height: 1.6;
      color: rgba(255,255,255,0.5); margin-bottom: 50px; max-width: 500px;
    }

    .contact-form { display: flex; flex-direction: column; gap: 0; }
    .contact-field {
      border-bottom: 1px solid rgba(255,255,255,0.15); padding: 24px 0;
    }
    .contact-field label {
      display: block; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.4); margin-bottom: 10px;
    }
    .contact-field input,
    .contact-field textarea,
    .contact-field select {
      width: 100%; background: transparent; border: none; outline: none;
      color: #fff; font-family: 'Stoyc-Heading', sans-serif; font-weight: 900;
      font-size: clamp(16px, 1.3vw, 22px); padding: 4px 0; resize: none;
    }
    .contact-field select {
      -webkit-appearance: none; cursor: pointer;
    }
    .contact-field select option { background: #111; color: #fff; }
    .contact-field textarea { height: 80px; }
    .contact-field input::placeholder,
    .contact-field textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .contact-submit {
      margin-top: 40px; display: inline-flex; align-items: center; gap: 12px;
      font-family: 'Stoyc-UI', sans-serif; font-size: 14px; text-transform: uppercase;
      letter-spacing: 0.08em; padding: 18px 44px; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px; background: transparent; color: #fff; cursor: pointer;
      transition: all 0.3s ease; align-self: flex-start;
    }
    .contact-submit:hover {
      background: #fff; color: #000; border-color: #fff;
    }
    .contact-submit:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .contact-form-status {
      margin-top: 28px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 500px;
    }
    .contact-form-status.is-error { color: #ff8a8a; }
    .contact-form-status.is-success { color: rgba(255,255,255,0.65); }
    .contact-hp {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    .contact-footer {
      position: fixed; bottom: 30px; left: 30px; right: 30px;
      display: flex; justify-content: space-between; align-items: flex-end;
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.4);
    }
    .contact-footer a { color: rgba(255,255,255,0.6); transition: color 0.3s ease; }
    .contact-footer a:hover { color: #fff; }

    @media (max-width: 600px) {
      .contact-nav { padding: 20px; }
      .contact-nav-links {
        gap: 10px 14px; font-size: 11px; flex-wrap: wrap;
        justify-content: flex-end;
      }
      .contact-page { padding: 100px 20px 120px; }
      .contact-footer { flex-direction: column; align-items: center; gap: 10px; bottom: 20px; }
    }
  </style>
</head>
<body>

  <nav class="contact-nav">
    <a href="/" class="contact-nav-logo">
      <img src="assets/stoyc-logo.svg" alt="Stoyc" width="100" height="24">
    </a>
    <div class="contact-nav-links">
      <a href="/marketing">Design and Marketing</a>
      <a href="/ai">AI Services</a>
    </div>
  </nav>

  <main class="contact-page">
    <div class="contact-container">
      <h1 class="contact-heading">Let's Talk</h1>
      <p class="contact-subtitle">Have a project in mind? Tell us about it. We'll get back to you within 24 hours.</p>

      <form class="contact-form" id="stoyc-contact-form" novalidate>
        <input class="contact-hp" type="text" name="website" tabindex="-1" autocomplete="off" aria-hidden="true">
        <div class="contact-field">
          <label for="contact-name">Your Name</label>
          <input id="contact-name" name="name" type="text" placeholder="Full name" required maxlength="200" autocomplete="name">
        </div>
        <div class="contact-field">
          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" placeholder="you@company.com" required maxlength="320" autocomplete="email">
        </div>
        <div class="contact-field">
          <label for="contact-service">What do you need?</label>
          <select id="contact-service" name="service" required>
            <option value="" disabled selected>Select a service</option>
            <option value="Website Design &amp; Development">Website Design &amp; Development</option>
            <option value="SEO &amp; Search Visibility">SEO &amp; Search Visibility</option>
            <option value="Paid Advertising">Paid Advertising</option>
            <option value="Brand &amp; Design">Brand &amp; Design</option>
            <option value="Full Package">Full Package</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="contact-field">
          <label for="contact-message">Tell us more</label>
          <textarea id="contact-message" name="message" placeholder="Brief description of your project, timeline, and goals..." maxlength="10000"></textarea>
        </div>
        <button type="submit" class="contact-submit" id="contact-submit">Send Message &rarr;</button>
        <p class="contact-form-status" id="contact-form-status" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer class="contact-footer">
    <span>Los Angeles, CA</span>
    <a href="mailto:rafi@stoyc.com">rafi@stoyc.com</a>
  </footer>

  <script>
    (function () {
      var form = document.getElementById('stoyc-contact-form');
      var statusEl = document.getElementById('contact-form-status');
      var btn = document.getElementById('contact-submit');
      if (!form || !statusEl || !btn) return;

      function setStatus(text, kind) {
        statusEl.textContent = text || '';
        statusEl.className = 'contact-form-status' + (kind ? ' ' + kind : '');
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        setStatus('');

        var fd = new FormData(form);
        var website = fd.get('website');
        if (website) {
          setStatus('Thanks — we\'ll be in touch soon.', 'is-success');
          return;
        }

        var payload = {
          name: (fd.get('name') || '').trim(),
          email: (fd.get('email') || '').trim(),
          service: (fd.get('service') || '').trim(),
          message: (fd.get('message') || '').trim(),
          website: (fd.get('website') || '').trim()
        };

        btn.disabled = true;
        var prevHtml = btn.innerHTML;
        btn.textContent = 'Sending…';

        fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (result) {
            if (result.ok && result.data && result.data.ok) {
              setStatus('Message sent. We\'ll get back to you within 24 hours.', 'is-success');
              form.reset();
            } else {
              var err = (result.data && result.data.error) || 'Something went wrong. Please try again or email us directly.';
              setStatus(err, 'is-error');
            }
          })
          .catch(function () {
            setStatus('Could not send. Check your connection or email us directly.', 'is-error');
          })
          .finally(function () {
            btn.disabled = false;
            btn.innerHTML = prevHtml;
          });
      });
    })();
  </script>

</body>
</html>
