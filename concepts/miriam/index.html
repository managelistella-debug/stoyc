<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/concepts/miriam/">
  <title>Miriam Wells — Brand Concepts by Stoyc</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    @font-face { font-family: 'Stoyc-UI'; font-weight: 400; src: url('../../assets/fonts/NordRegular.woff2') format('woff2'); }
    @font-face { font-family: 'Stoyc-UI'; font-weight: 500; src: url('../../assets/fonts/NordMedium.woff2') format('woff2'); }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --surface: #111;
      --border: #262626;
      --text: #fff;
      --muted: #a8a8a8;
      --blue: #0095f6;
      --grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100%;
    }

    /* ════════════════════════════════
       MOBILE LAYOUT  (< 768px)
    ════════════════════════════════ */

    /* ── Mobile top bar ── */
    .mobile-top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
    }

    .mobile-top-bar-name {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.02em;
    }

    /* ── Mobile profile header ── */
    .mobile-profile {
      padding: 20px 16px 12px;
    }

    .mobile-profile-top {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 14px;
    }

    .profile-avatar-wrap {
      width: 86px; height: 86px;
      border-radius: 50%;
      padding: 3px;
      background: var(--grad);
      flex-shrink: 0;
    }

    .profile-avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--bg);
      padding: 3px;
      display: flex; align-items: center; justify-content: center;
    }

    .profile-avatar-inner img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: contain;
      padding: 10px;
    }

    .mobile-stats { display: flex; gap: 20px; flex: 1; }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-num { font-weight: 700; font-size: 17px; }
    .stat-label { font-size: 12px; color: var(--muted); }

    .profile-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .profile-bio { font-size: 13px; color: var(--muted); line-height: 1.4; }
    .profile-link { margin-top: 4px; }
    .profile-link a { color: var(--blue); font-weight: 600; text-decoration: none; }
    .profile-link a:hover { text-decoration: underline; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 11px 0; cursor: pointer;
      border-top: 2px solid transparent;
    }

    .tab.active { border-top-color: var(--text); }
    .tab svg { width: 22px; height: 22px; fill: var(--muted); }
    .tab.active svg { fill: var(--text); }

    /* ── Grid (shared mobile/desktop) ── */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .grid-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
    }

    .grid-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.2s;
    }

    .grid-item:hover img { opacity: 0.72; }

    /* Title overlay on grid item */
    .grid-title {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 8px 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    /* Carousel dots badge */
    .grid-carousel-icon {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 2px;
    }

    .grid-carousel-icon span {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.85); display: block;
    }

    /* ── Stoyc footer ── */
    .stoyc-footer {
      text-align: center;
      padding: 20px 0 32px;
      font-size: 11px;
      color: var(--border);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Stoyc-UI', sans-serif;
    }

    .stoyc-footer a { color: inherit; text-decoration: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: #333; color: #fff;
      font-size: 13px; padding: 10px 20px;
      border-radius: 20px; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ════════════════════════════════
       MODAL (shared)
    ════════════════════════════════ */

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200; align-items: center; justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    /* Mobile: bottom sheet */
    .modal-sheet {
      background: var(--bg);
      width: min(100vw, 480px);
      max-height: 100dvh;
      overflow-y: auto;
      border-radius: 12px 12px 0 0;
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      scrollbar-width: none;
    }

    .modal-sheet::-webkit-scrollbar { display: none; }

    .modal-handle { display: flex; justify-content: center; padding: 10px 0 4px; }
    .modal-handle span { width: 36px; height: 4px; border-radius: 2px; background: var(--border); }

    .modal-post-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px 8px;
    }

    .modal-avatar-wrap {
      width: 34px; height: 34px; border-radius: 50%;
      padding: 2px; background: var(--grad); flex-shrink: 0;
    }

    .modal-avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--bg); padding: 2px;
      display: flex; align-items: center; justify-content: center;
    }

    .modal-avatar-inner img {
      width: 100%; height: 100%;
      border-radius: 50%; object-fit: contain; padding: 4px;
    }

    .modal-back-btn {
      position: absolute; top: 12px; left: 12px; z-index: 20;
      background: rgba(0,0,0,0.45); border: none; cursor: pointer;
      color: #fff; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-back-btn svg { width: 18px; height: 18px; }

    .modal-meta { flex: 1; }
    .modal-username { font-weight: 600; font-size: 13px; }
    .modal-concept-label { font-size: 11px; color: var(--muted); }
    .modal-more { font-size: 20px; color: var(--text); cursor: pointer; margin-left: auto; line-height: 1; }

    .modal-carousel {
      position: relative; width: 100%; aspect-ratio: 4/5; overflow: hidden;
    }

    .modal-track {
      display: flex; height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-slide { flex: 0 0 100%; height: 100%; }

    .modal-slide img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
      user-select: none; -webkit-user-drag: none;
    }

    .modal-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.86); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: opacity 0.2s;
    }

    .modal-btn.prev { left: 10px; }
    .modal-btn.next { right: 10px; }
    .modal-btn svg { width: 14px; height: 14px; }
    .modal-btn:disabled { opacity: 0; pointer-events: none; }

    .modal-dots {
      position: absolute; bottom: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 4px;
    }

    .modal-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: background 0.2s, transform 0.2s;
    }

    .modal-dot.active { background: var(--blue); transform: scale(1.25); }

    .modal-counter {
      position: absolute; top: 10px; right: 12px;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: 11px; font-weight: 600;
      border-radius: 12px; padding: 3px 8px; letter-spacing: 0.02em;
    }

    .modal-actions {
      display: flex; align-items: center;
      padding: 10px 14px 6px; gap: 14px;
    }

    .modal-action-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text); display: flex; align-items: center;
    }

    .modal-action-btn svg { width: 24px; height: 24px; }

    .modal-caption {
      padding: 4px 14px 14px;
      font-size: 13px; line-height: 1.55; color: var(--text);
    }

    .modal-caption .uname { font-weight: 600; margin-right: 5px; }

    .modal-close {
      display: flex; justify-content: center;
      padding: 14px 0 max(20px, env(safe-area-inset-bottom));
    }

    .modal-close button {
      background: var(--surface); border: none;
      color: var(--muted); font-size: 13px;
      padding: 10px 28px; border-radius: 20px;
      cursor: pointer; letter-spacing: 0.04em;
    }

    /* Grid items at 4:5 */
    .grid-item { aspect-ratio: 4 / 5; }

    /* ════════════════════════════════
       DESKTOP LAYOUT  (≥ 768px)
    ════════════════════════════════ */

    .desktop-layout { display: none; }

    @media (min-width: 768px) {
      .mobile-wrapper { display: none; }
      .desktop-layout { display: block; }

      body { background: #000; }

      /* Centered column, Instagram-style */
      .desktop-content {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 20px 60px;
      }

      /* Desktop profile header */
      .desktop-profile-header {
        display: flex;
        gap: 40px;
        align-items: flex-start;
        margin-bottom: 44px;
        padding-bottom: 44px;
        border-bottom: 1px solid var(--border);
      }

      .desktop-profile-avatar {
        width: 150px; height: 150px;
        border-radius: 50%;
        padding: 4px;
        background: var(--grad);
        flex-shrink: 0;
      }

      .desktop-profile-avatar-inner {
        width: 100%; height: 100%; border-radius: 50%;
        background: var(--bg); padding: 4px;
        display: flex; align-items: center; justify-content: center;
      }

      .desktop-profile-avatar-inner img {
        width: 100%; height: 100%;
        object-fit: contain; padding: 18px;
      }

      .desktop-profile-info { flex: 1; }

      .desktop-profile-username {
        font-size: 28px; font-weight: 300;
        letter-spacing: -0.02em; margin-bottom: 20px;
      }

      .desktop-profile-stats {
        display: flex; gap: 40px; margin-bottom: 20px;
      }

      .desktop-stat { display: flex; gap: 5px; align-items: baseline; }
      .desktop-stat-num { font-weight: 700; font-size: 16px; }
      .desktop-stat-label { font-size: 15px; color: var(--text); }

      .desktop-profile-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
      .desktop-profile-bio { font-size: 14px; color: var(--muted); line-height: 1.5; }

      /* Desktop tab row */
      .desktop-tab-bar {
        display: flex;
        justify-content: center;
        gap: 60px;
        margin-bottom: 0;
      }

      .desktop-tab {
        display: flex; align-items: center; gap: 6px;
        padding: 16px 0; cursor: pointer;
        border-top: 1px solid transparent;
        margin-top: -1px;
        font-size: 12px; font-weight: 600;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--muted);
      }

      .desktop-tab.active { border-top-color: var(--text); color: var(--text); }
      .desktop-tab svg { width: 14px; height: 14px; fill: currentColor; }

      /* Desktop modal — centered dialog */
      .modal-sheet {
        position: relative;
        bottom: auto; left: auto; top: auto;
        transform: none;
        width: min(90vw, 900px);
        max-height: 90vh;
        border-radius: 12px;
        display: flex;
        flex-direction: row;
        overflow: hidden;
      }

      .modal-handle { display: none; }

      .modal-carousel-col {
        flex: 1; min-width: 0;
        display: flex; flex-direction: column;
        border-right: 1px solid var(--border);
      }

      .modal-carousel { aspect-ratio: 4 / 5; flex: 1; }

      .modal-info-col {
        width: 320px; flex-shrink: 0;
        display: flex; flex-direction: column;
        overflow-y: auto; scrollbar-width: none;
      }

      .modal-info-col::-webkit-scrollbar { display: none; }
      .modal-close { padding: 16px 14px max(16px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>

  {

// ═══════════════════════════════════════════════
//  Auto-number grid titles
// ═══════════════════════════════════════════════

let fontConceptCount = 0;
POSTS.forEach(post => {
  if (post.type === 'main')  { mainConceptCount++; post.gridTitle = `Main Concept ${mainConceptCount}`; }
  else if (post.type === 'font') { fontConceptCount++; post.gridTitle = `Font Concept ${fontConceptCount}`; }
  else                       { altConceptCount++;  post.gridTitle = `Alt Concept ${altConceptCount}`;  }
});

// ═══════════════════════════════════════════════
//  Build grids
// ═══════════════════════════════════════════════

function buildGrid(containerId) {
  const grid = document.getElementById(containerId);
  if (!grid) return;
  POSTS.forEach((post, i) => {
    const isCarousel = post.images.length > 1;
    const item = document.createElement('div');
    item.className = 'grid-item';
    item.innerHTML = `
      <img src="${post.images[0]}" alt="${post.label}" loading="lazy">
      <div class="grid-title">${post.gridTitle}</div>
      ${isCarousel ? `<div class="grid-carousel-icon"><span></span><span></span><span></span></div>` : ''}
    `;
    item.addEventListener('click', () => openModal(i));
    grid.appendChild(item);
  });
}

buildGrid('postGridMobile');
buildGrid('postGridDesktop');

const count = POSTS.length;
['postCountMobile','postCountDesktop'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = count;
});

// ═══════════════════════════════════════════════
//  Modal
// ═══════════════════════════════════════════════

let modalIdx = 0;
let modalPost = null;

function openModal(postIndex) {
  modalPost = POSTS[postIndex];
  modalIdx = 0;

  document.getElementById('modalLabel').textContent = modalPost.label;

  const capEl = document.getElementById('modalCaption');
  const formattedCaption = modalPost.caption
    ? modalPost.caption
        .split('\n\n')
        .map(chunk => (chunk.length < 50 && !chunk.includes('.') ? `<strong>${chunk}</strong>` : chunk))
        .join('<br><br>')
        .replace(/\n/g, '<br>')
    : '';
  capEl.innerHTML = formattedCaption
    ? `<span class="uname">Miriam Wells</span>${formattedCaption}`
    : '';

  const track = document.getElementById('modalTrack');
  track.innerHTML = modalPost.images.map(src =>
    `<div class="modal-slide"><img src="${src}" alt="${modalPost.label}"></div>`
  ).join('');

  const dotsEl = document.getElementById('modalDots');
  dotsEl.innerHTML = modalPost.images.length > 1
    ? modalPost.images.map((_, i) => `<div class="modal-dot${i === 0 ? ' active' : ''}"></div>`).join('')
    : '';

  const counter = document.getElementById('modalCounter');
  counter.style.display = modalPost.images.length > 1 ? 'block' : 'none';
  counter.textContent = `1 / ${modalPost.images.length}`;

  document.getElementById('modalPrev').disabled = true;
  document.getElementById('modalNext').disabled = modalPost.images.length <= 1;

  track.style.transform = 'translateX(0)';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Push ?post=N so back button closes modal and link is shareable
  const url = new URL(window.location.href);
  url.searchParams.set('post', postIndex);
  history.pushState({ post: postIndex }, '', url.toString());

  // Reset heart
  const heartBtn = document.querySelector('.modal-action-btn');
  heartBtn.dataset.liked = '0';
  heartBtn.querySelector('path').style.fill = 'currentColor';
}

function closeModal(pushHistory = false) {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  // If closed via button (not back), pop the history entry we pushed
  if (pushHistory) {
    history.back();
  } else {
    const url = new URL(window.location.href);
    url.searchParams.delete('post');
    history.replaceState(null, '', url.toString());
  }
}

// Browser back button closes modal instead of leaving page
window.addEventListener('popstate', () => {
  if (document.getElementById('modal').classList.contains('open')) {
    closeModal(false);
  }
});

function modalSlide(dir) {
  const count = modalPost.images.length;
  modalIdx = Math.max(0, Math.min(count - 1, modalIdx + dir));
  document.getElementById('modalTrack').style.transform = `translateX(-${modalIdx * 100}%)`;
  document.querySelectorAll('.modal-dot').forEach((d, i) => d.classList.toggle('active', i === modalIdx));
  document.getElementById('modalCounter').textContent = `${modalIdx + 1} / ${count}`;
  document.getElementById('modalPrev').disabled = modalIdx === 0;
  document.getElementById('modalNext').disabled = modalIdx === count - 1;
}

// Touch swipe
const modalCarousel = document.getElementById('modalCarousel');
let swipeStart = null;
modalCarousel.addEventListener('touchstart', e => { swipeStart = e.touches[0].clientX; }, { passive: true });
modalCarousel.addEventListener('touchend', e => {
  if (swipeStart === null) return;
  const dx = e.changedTouches[0].clientX - swipeStart;
  if (Math.abs(dx) > 40) modalSlide(dx < 0 ? 1 : -1);
  swipeStart = null;
}, { passive: true });

// Close on backdrop
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Esc key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal(true);
  if (e.key === 'ArrowRight') modalSlide(1);
  if (e.key === 'ArrowLeft')  modalSlide(-1);
});

// ═══════════════════════════════════════════════
//  Actions
// ═══════════════════════════════════════════════

function toggleHeart(btn) {
  const isOn = btn.dataset.liked === '1';
  btn.dataset.liked = isOn ? '0' : '1';
  btn.querySelector('path').style.fill = isOn ? 'currentColor' : '#ed4956';
}

function copyLink(btn) {
  navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied')).catch(() => showToast('Link copied'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Auto-open post from ?post= param on page load
(function() {
  const idx = parseInt(new URLSearchParams(window.location.search).get('post'));
  if (!isNaN(idx) && idx >= 0 && idx < POSTS.length) openModal(idx);
})();
</script>
